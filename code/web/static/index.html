<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>智能投资组合配置</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>

  <header class="topbar">
    <div class="topbar-inner">
      <span class="logo">智能投资组合</span>
      <span class="tagline">输入你的看法，帮你算出最优仓位</span>
    </div>
  </header>

  <main class="main">

    <!-- ── 第一步：选择资产 ── -->
    <section class="card">
      <div class="step-num">①</div>
      <h2>你投哪些标的？</h2>
      <p class="step-desc">输入你想投资的股票或 ETF，也可以直接使用下面的示例</p>

      <button class="chip preset-btn" data-preset="sample" id="btnPreset">📊 加载示例数据（10只美股龙头 + 真实历史数据）</button>

      <div class="two-col">
        <label class="fld">
          <span class="fld-name">标的名称</span>
          <textarea id="inputAssets" rows="2" placeholder="AAPL, MSFT, AMZN, JPM, V"></textarea>
          <span class="fld-tip">用逗号或换行分隔，至少输入 2 个</span>
        </label>
        <label class="fld">
          <span class="fld-name">当前仓位比例</span>
          <textarea id="inputWeights" rows="2" placeholder="每个标的各占 20%"></textarea>
          <span class="fld-tip">与标的顺序一致，加起来应等于 1（100%）</span>
        </label>
      </div>

      <label class="fld">
        <span class="fld-name">历史涨跌数据</span>
        <textarea id="inputReturns" rows="5" placeholder="每行是一期，每列是一个标的的涨跌幅&#10;例如：0.001, -0.002, 0.003, 0.001, 0.000"></textarea>
        <span class="fld-tip">如果你没有数据，点上面的"美股龙头"就会自动填入真实数据</span>
      </label>

      <button class="toggle-link" id="btnToggleSettings">▸ 更多设置</button>
      <div class="collapse" id="panelSettings">
        <div class="three-col">
          <label class="fld"><span class="fld-name">最大仓位</span><input id="inputMaxWeight" type="number" step="0.05" value="0.35"></label>
          <label class="fld"><span class="fld-name">换手限制</span><input id="inputTurnoverLimit" type="number" step="0.05" value="0.5"></label>
          <label class="fld"><span class="fld-name">无风险利率</span><input id="inputRf" type="number" step="0.001" value="0.0324"></label>
        </div>
        <label class="chk"><input id="inputLongOnly" type="checkbox" checked> 不允许卖空（推荐普通投资者勾选）</label>
      </div>
    </section>

    <!-- ── 第二步：表达看法 ── -->
    <section class="card">
      <div class="step-num">②</div>
      <h2>你有什么看法？</h2>
      <p class="step-desc">如果你对某些标的未来走势有判断，可以在这里添加。没有看法也可以直接跳过</p>

      <div id="viewsContainer" class="views"></div>

      <button id="btnAddView" class="btn-add-view">＋ 添加一条看法</button>

      <p class="skip-note">💡 没有看法也没关系——模型会自动参考市场共识给出一个均衡的配置方案</p>
    </section>

    <!-- ── 计算按钮 ── -->
    <div class="action-bar">
      <button id="btnCalc" class="btn-go">开始计算最优方案</button>
    </div>

    <!-- ── 第三步：查看结果 ── -->
    <section class="card result-card" id="cardResult" style="display:none">
      <div class="step-num">③</div>
      <div class="result-head">
        <h2>你的最优配置方案</h2>
        <div class="result-head-right">
          <span id="statusBadge" class="tag tag-ok">✓ 计算完成</span>
          <button id="btnDownload" class="link-btn">下载表格</button>
        </div>
      </div>

      <!-- 指标 -->
      <div class="kpis">
        <div class="kpi">
          <span class="kpi-label">预期年化收益</span>
          <strong class="kpi-val" id="mAnnualReturn">--</strong>
        </div>
        <div class="kpi">
          <span class="kpi-label">预期波动</span>
          <strong class="kpi-val" id="mAnnualVol">--</strong>
        </div>
        <div class="kpi">
          <span class="kpi-label">风险收益比</span>
          <strong class="kpi-val" id="mSharpe">--</strong>
        </div>
        <div class="kpi">
          <span class="kpi-label">调仓幅度</span>
          <strong class="kpi-val" id="mTurnover">--</strong>
        </div>
      </div>

      <!-- 权重条形图 -->
      <div class="bar-chart" id="barChart"></div>

      <!-- 简易表格 -->
      <div class="simple-table">
        <table id="resultTable">
          <thead>
            <tr>
              <th>标的</th>
              <th>当前仓位</th>
              <th>建议仓位</th>
              <th>预期涨跌</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>

      <p class="disclaimer">⚠️ 以上结果基于历史数据和你的看法计算得出，仅供参考，不构成投资建议。</p>
    </section>

  </main>

  <!-- 加载蒙层 -->
  <div class="loading-mask" id="loadingMask">
    <div class="loading-dot"></div>
    <span>正在计算最优方案…</span>
  </div>

  <script src="/app.js"></script>
</body>
</html>
